format = """
$character\
$username\
@\
$hostname\
$directory\
$git_branch\
$git_status \
"""
add_newline = false
palette = "catppuccin_mocha"
command_timeout = 5000

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[character]
success_symbol = ''
error_symbol = ' [✗](bold red)'

[username]
show_always = true
style_user = 'text'
format = '[$user]($style)'
disabled = false

[hostname]
ssh_only = false
format = '$hostname '

[directory]
style = "fg:crust bg:mauve"
format = "[ $path ]($style)"
truncation_length = 1
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "fg:crust bg:peach"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:crust bg:maroon"
format = '[ $all_status$ahead_behind ]($style)'

# --- Claude Code statusline (starship statusline claude-code) ---
[profiles]
claude-code = "$claude_model$directory$git_branch$claude_context$claude_cost\n${custom.las_working}${custom.las_rest}${custom.las_off}${custom.las_time}"

[claude_model]
format = '[ $symbol$model ]($style)'
symbol = '✳ '
style = 'fg:crust bg:blue'

[claude_context]
format = '[ ]($style)[$gauge]($style inverted)[ $percentage ]($style)'
gauge_width = 5
display = [
  { threshold = 0.0, style = 'fg:crust bg:green' },
  { threshold = 60.0, style = 'fg:crust bg:yellow' },
  { threshold = 80.0, style = 'fg:crust bg:red' },
]

[claude_cost]
format = '[ \$$cost ]($style)'
display = [
  { threshold = 0.0, style = 'fg:crust bg:teal' },
  { threshold = 5.0, style = 'fg:crust bg:flamingo' },
  { threshold = 20.0, style = 'fg:crust bg:maroon' },
]

# LAS 근태 (스크립트/토큰은 ~/.config/las/ 로컬 전용 — 토큰을 이 저장소에 넣지 말 것)
[custom.las_working]
command = '~/.config/las/statusline.sh status'
when = '~/.config/las/statusline.sh when working'
style = 'fg:crust bg:green'
format = '[ $output ]($style)'
shell = ['bash', '--noprofile', '--norc']

[custom.las_rest]
command = '~/.config/las/statusline.sh status'
when = '~/.config/las/statusline.sh when rest'
style = 'fg:crust bg:yellow'
format = '[ $output ]($style)'
shell = ['bash', '--noprofile', '--norc']

[custom.las_off]
command = '~/.config/las/statusline.sh status'
when = '~/.config/las/statusline.sh when off'
style = 'fg:crust bg:overlay1'
format = '[ $output ]($style)'
shell = ['bash', '--noprofile', '--norc']

[custom.las_time]
command = '~/.config/las/statusline.sh time'
when = '~/.config/las/statusline.sh when time'
style = 'fg:crust bg:sapphire'
format = '[ $output ]($style)'
shell = ['bash', '--noprofile', '--norc']
